<script>
const ads="https://omg10.com/4/10426491";
const vid=document.getElementById("vid");
const layer=document.getElementById("tapLayer");
const icon=document.getElementById("playIcon");
const timeEl=document.getElementById("time");
const fill=document.getElementById("fill");
const bar=document.getElementById("progress");
const fs=document.getElementById("fs");

let first=true;
let lastAd=0;

function openAd(){
  const now=Date.now();
  if(now-lastAd>10000){ // cooldown 10 detik
    lastAd=now;
    window.open(ads,"_blank");
  }
}

// TAP LAYER
layer.onclick=function(){
  if(first){
    first=false;
    icon.style.display="none";
    vid.muted=false;
    vid.play();
    openAd(); // ads pertama
  } else {
    openAd(); // interaksi berikutnya
  }
};

// PROGRESS BAR (optional trigger)
bar.onclick=function(e){
  e.stopPropagation();
  const rect=bar.getBoundingClientRect();
  vid.currentTime=((e.clientX-rect.left)/rect.width)*vid.duration;
  openAd();
};

// FULLSCREEN (optional trigger)
fs.onclick=function(e){
  e.stopPropagation();
  openAd();
  if(vid.requestFullscreen) vid.requestFullscreen();
  else if(vid.webkitRequestFullscreen) vid.webkitRequestFullscreen();
};

// UPDATE TIME
vid.addEventListener("timeupdate",()=>{
  if(!isNaN(vid.duration)){
    const p=(vid.currentTime/vid.duration)*100;
    fill.style.width=p+"%";
    const fmt=t=>Math.floor(t/60)+":"+String(Math.floor(t%60)).padStart(2,"00");
    timeEl.textContent=fmt(vid.currentTime)+" / "+fmt(vid.duration);
  }
});
</script>
